worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  access_log /dev/stdout;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  upstream hono_api {
    server 127.0.0.1:3001;
  }

  server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API requests to Hono (single internal upstream).
    location /api/ {
      proxy_pass http://hono_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # SPA fallback: any unmatched route serves index.html so Vue Router (or
    # a manual reload deep into a client-side path) hydrates correctly.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
